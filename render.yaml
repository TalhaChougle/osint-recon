services:
  - type: web
    name: osint-lens-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel frontend URL
      - key: PORT
        value: 3001
